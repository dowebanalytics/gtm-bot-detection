<script>
(function() {
  if (window._bdHelperLoaded) return;
  window._bdHelperLoaded = true;

  // ── CONFIGURAZIONE ────────────────────────────────────────────────────────
  // Ex Init Tag — spostato qui per evitare sandbox restrictions GTM
  // Modifica _bdThreshold per cambiare soglia senza toccare il template
  window._bdThreshold = 5;     // 3=aggressiva | 5=default | 7=conservativa
  window._bdDebug     = false; // true = log [BotDetect] in console su tutti i domini
  window._bdInit      = true;

  // ── TIMEZONE ──────────────────────────────────────────────────────────────
  try {
    window._bdTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
  } catch(e) {
    window._bdTimezone = '';
  }

  // ── PLUGIN COUNT ──────────────────────────────────────────────────────────
  window._bdPluginsLen = (navigator.plugins) ? navigator.plugins.length : -1;

  // ── MOUSE / SCROLL LISTENERS (IE11 compatible) ────────────────────────────
  window._bdMouseMoved = false;
  window._bdScrolled   = false;

  document.addEventListener('mousemove', function handler() {
    window._bdMouseMoved = true;
    document.removeEventListener('mousemove', handler);
  });
  document.addEventListener('scroll', function handler() {
    window._bdScrolled = true;
    document.removeEventListener('scroll', handler);
  });

  // ── CANVAS FINGERPRINT ────────────────────────────────────────────────────
  // 0 = rendering ok | 1 = canvas bloccato (+1) | 3 = canvas vuoto (+3)
  try {
    var canvas = document.createElement('canvas');
    var ctx    = canvas.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font         = '14px Arial';
    ctx.fillText('BotDetect', 2, 2);
    window._bdCanvasScore = (canvas.toDataURL().length < 200) ? 3 : 0;
  } catch(e) {
    window._bdCanvasScore = 1;
  }

  // ── WEBGL RENDERER ────────────────────────────────────────────────────────
  // 0 = GPU ok | 1 = errore (+1) | 2 = WebGL assente (+2) | 3 = software GPU (+3)
  try {
    var gl = document.createElement('canvas').getContext('webgl') ||
             document.createElement('canvas').getContext('experimental-webgl');
    if (!gl) {
      window._bdWebGLScore = 2;
    } else {
      var di = gl.getExtension('WEBGL_debug_renderer_info');
      if (di) {
        var r = (gl.getParameter(di.UNMASKED_RENDERER_WEBGL) || '') +
                (gl.getParameter(di.UNMASKED_VENDOR_WEBGL)   || '');
        window._bdWebGLScore = (r.indexOf('SwiftShader')  !== -1 ||
                                r.indexOf('llvmpipe')     !== -1 ||
                                r.indexOf('VirtualBox')   !== -1 ||
                                r.indexOf('VMware')       !== -1 ||
                                r.indexOf('Mesa')         !== -1) ? 3 : 0;
      } else {
        window._bdWebGLScore = 0;
      }
    }
  } catch(e) {
    window._bdWebGLScore = 1;
  }

  // ── PERMISSIONS API (async) ───────────────────────────────────────────────
  // Risultato disponibile dalla seconda valutazione della variabile Result
  window._bdNotificationsDenied = false;
  try {
    if (navigator.permissions && navigator.permissions.query) {
      navigator.permissions.query({ name: 'notifications' }).then(function(res) {
        window._bdNotificationsDenied = (res.state === 'denied');
      });
    }
  } catch(e) {}

})();
</script>
